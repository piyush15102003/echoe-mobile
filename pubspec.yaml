name: echoe_mobile
description: "Echoe — your emotional companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & networking
  dio: ^5.8.0+1

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Biometrics
  local_auth: ^2.3.0

  # Audio
  record: ^6.2.0
  just_audio: ^0.9.43
  path_provider: ^2.1.5

  # UI
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2815.0
  flutter_animate: ^4.5.2

  # Crypto
  dbcrypt: ^2.0.0

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# ── App Icon ──────────────────────────────────────────────────────────────────
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/echoe_logo.png"
  background_color_ios: "#FEF9F1"
  remove_alpha_ios: true
  # Android 13+ adaptive icon
  adaptive_icon_background: "#FEF9F1"
  adaptive_icon_foreground: "assets/images/echoe_logo.png"
  # Don't generate for platforms we're not targeting
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# ── Splash Screen ─────────────────────────────────────────────────────────────
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  # Cream background — matches Echoe's home screen
  color: "#FEF9F1"
  image: assets/images/echoe_logo.png
  # Android 12+ splash (uses windowSplashScreenAnimatedIcon)
  android_12:
    image: assets/images/echoe_logo.png
    icon_background_color: "#FEF9F1"
    color: "#FEF9F1"

  # iOS — same cream background
  ios: true

  # Keep native splash until Flutter is ready
  fullscreen: false
  android: true
