name: echoe_mobile
description: "Echoe — your emotional companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & networking
  dio: ^5.8.0+1

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Biometrics
  local_auth: ^2.3.0

  # Audio
  record: ^5.2.1
  just_audio: ^0.9.43

  # UI
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2815.0

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
